<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a0f08" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Os Cabra" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon-192.png" />
    <title>Os Cabra</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background: #1a0f08;
        overflow: hidden;
        font-family: system-ui, sans-serif;
        /* iOS: nunca permitir zoom/pan via gesto no jogo */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      /*
        Não usamos display:flex aqui — o Phaser Scale.FIT+CENTER_BOTH já
        posiciona o canvas via position:absolute. Flex layout no parent
        conflita com o cálculo do Phaser e em alguns viewports o canvas
        resultava em height=0 (nave ficava fora da tela).
      */
      #game {
        width: 100vw;
        height: 100vh;
        position: relative;
        /* iPad: evita que a barra de status/home-bar corte os controles touch */
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
                 env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
      }
      #game canvas {
        display: block;
        image-rendering: pixelated;
        /* Em mobile, evita menu de contexto em long-press */
        -webkit-touch-callout: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
