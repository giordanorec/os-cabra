<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon-192.png" />
    <title>Os Cabra</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background: #2db8d6;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      /*
        Não usamos display:flex aqui — o Phaser Scale.FIT+CENTER_BOTH já
        posiciona o canvas via position:absolute. Flex layout no parent
        conflita com o cálculo do Phaser e em alguns viewports o canvas
        resultava em height=0 (nave ficava fora da tela).
      */
      #game {
        width: 100vw;
        height: 100vh;
        position: relative;
      }
      #game canvas {
        display: block;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
