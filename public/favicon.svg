<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Galo da Madrugada — xilogravura-style favicon
       Palette (see docs/palette.md):
         #f4e4c1 papel antigo   — background
         #1a0f08 preto pergaminho — silhueta
         #b84a2e vermelho tijolo  — crista + bico -->
  <rect width="64" height="64" fill="#f4e4c1"/>
  <!-- Tail (arching feathers, top-left) -->
  <path d="M 2 32 Q -2 8 20 6 Q 24 14 16 22 Q 8 28 10 38 Z" fill="#1a0f08"/>
  <path d="M 6 22 Q 4 10 18 10 L 20 18 Q 14 22 14 28 Z" fill="#f4e4c1"/>
  <!-- Body (big rounded blob) -->
  <ellipse cx="34" cy="40" rx="20" ry="14" fill="#1a0f08"/>
  <!-- Wing hint (negative space crescent) -->
  <path d="M 24 38 Q 34 36 42 42 Q 34 42 24 42 Z" fill="#f4e4c1"/>
  <!-- Head -->
  <circle cx="48" cy="22" r="12" fill="#1a0f08"/>
  <!-- Comb (three-pointed crest) -->
  <path d="M 38 12 L 42 2 L 46 10 L 50 2 L 54 10 L 58 2 L 60 14 Z" fill="#b84a2e"/>
  <!-- Wattle (under beak) -->
  <path d="M 56 26 L 62 28 L 56 32 Z" fill="#b84a2e"/>
  <!-- Beak -->
  <path d="M 58 20 L 64 22 L 58 24 Z" fill="#b84a2e"/>
  <!-- Eye -->
  <circle cx="50" cy="20" r="1.8" fill="#f4e4c1"/>
  <!-- Legs -->
  <rect x="26" y="52" width="4" height="9" fill="#1a0f08"/>
  <rect x="38" y="52" width="4" height="9" fill="#1a0f08"/>
  <!-- Feet -->
  <path d="M 22 62 L 34 62 M 36 62 L 46 62" stroke="#1a0f08" stroke-width="2.5" stroke-linecap="square"/>
</svg>
