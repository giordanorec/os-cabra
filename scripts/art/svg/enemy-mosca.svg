<!-- Mosca-da-Manga — enxame. 2 frames (asas bate).
     viewBox: 28×14 (2 frames de 14×14).
     Palette: preto pergaminho, ocre, papel antigo. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 14" shape-rendering="geometricPrecision">
  <defs>
    <g id="mosca-base">
      <!-- corpo: duas elipses (tórax + abdômen) -->
      <ellipse cx="7" cy="7" rx="2.5" ry="2" fill="#1a0f08"/>
      <ellipse cx="7" cy="9.5" rx="2" ry="1.5" fill="#1a0f08"/>
      <!-- cabeça -->
      <circle cx="7" cy="5" r="1.3" fill="#1a0f08"/>
      <!-- olhos grandes (mosca) -->
      <circle cx="6.2" cy="4.7" r="0.5" fill="#d4a04c"/>
      <circle cx="7.8" cy="4.7" r="0.5" fill="#d4a04c"/>
      <!-- pernas finas -->
      <path d="M 5 8 L 3 10 M 9 8 L 11 10 M 5 10 L 4 12 M 9 10 L 10 12" stroke="#1a0f08" stroke-width="0.4"/>
    </g>
  </defs>

  <!-- Frame 0: asas pra cima -->
  <g transform="translate(0,0)">
    <!-- asa esquerda -->
    <path d="M 5 6 Q 1 2 2 7 Q 4 8 5 7 Z" fill="#f4e4c1" stroke="#1a0f08" stroke-width="0.3"/>
    <!-- asa direita -->
    <path d="M 9 6 Q 13 2 12 7 Q 10 8 9 7 Z" fill="#f4e4c1" stroke="#1a0f08" stroke-width="0.3"/>
    <use href="#mosca-base"/>
  </g>

  <!-- Frame 1: asas pra baixo -->
  <g transform="translate(14,0)">
    <!-- asa esquerda -->
    <path d="M 5 8 Q 1 11 2 6 Q 4 6 5 7 Z" fill="#f4e4c1" stroke="#1a0f08" stroke-width="0.3"/>
    <!-- asa direita -->
    <path d="M 9 8 Q 13 11 12 6 Q 10 6 9 7 Z" fill="#f4e4c1" stroke="#1a0f08" stroke-width="0.3"/>
    <use href="#mosca-base"/>
  </g>
</svg>
