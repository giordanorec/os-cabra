<!-- Passista de Frevo — 2 frames de idle (sway).
     viewBox: 64×32 (2 frames de 32×32).
     Palette: preto pergaminho #1a0f08, vermelho tijolo #b84a2e, ocre #d4a04c, rosa fosco #d66b7a, papel antigo #f4e4c1. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 32" shape-rendering="geometricPrecision">
  <defs>
    <!-- Sombrinha reutilizável (centro-topo) -->
    <g id="sombrinha">
      <!-- cúpula listrada -->
      <path d="M 10 7 A 6 5 0 0 1 22 7 Z" fill="#b84a2e"/>
      <path d="M 13 7 Q 16 2 19 7 Z" fill="#d4a04c"/>
      <path d="M 11 7 Q 14 3 15 7 Z" fill="#d66b7a"/>
      <path d="M 17 7 Q 18 3 21 7 Z" fill="#d66b7a"/>
      <!-- ponta -->
      <circle cx="16" cy="2" r="0.8" fill="#1a0f08"/>
      <!-- cabo -->
      <rect x="15.5" y="7" width="1" height="4" fill="#1a0f08"/>
    </g>
  </defs>

  <!-- Frame 0: pose esquerda -->
  <g transform="translate(0,0)">
    <use href="#sombrinha"/>
    <!-- braço segurando cabo -->
    <path d="M 14 11 L 13 14 L 15 14 Z" fill="#1a0f08"/>
    <!-- cabeça -->
    <circle cx="16" cy="13" r="2.5" fill="#1a0f08"/>
    <!-- tronco arqueado pra esquerda -->
    <path d="M 14 15 Q 11 19 13 22 L 17 22 Q 18 18 18 15 Z" fill="#1a0f08"/>
    <!-- braço direito estendido -->
    <path d="M 18 16 L 23 18 L 22 19 L 18 17 Z" fill="#1a0f08"/>
    <!-- detalhe da roupa (faixa) -->
    <rect x="13" y="18" width="5" height="1.5" fill="#d4a04c"/>
    <!-- perna esquerda dobrada -->
    <path d="M 13 22 L 11 26 L 13 27 L 15 23 Z" fill="#1a0f08"/>
    <!-- perna direita esticada -->
    <path d="M 16 22 L 19 28 L 21 28 L 17 22 Z" fill="#1a0f08"/>
    <!-- sapatos -->
    <ellipse cx="12" cy="27" rx="2" ry="1" fill="#1a0f08"/>
    <ellipse cx="20" cy="28" rx="2" ry="1" fill="#1a0f08"/>
  </g>

  <!-- Frame 1: pose espelhada (perna oposta) -->
  <g transform="translate(32,0)">
    <use href="#sombrinha"/>
    <!-- braço segurando cabo -->
    <path d="M 18 11 L 19 14 L 17 14 Z" fill="#1a0f08"/>
    <!-- cabeça -->
    <circle cx="16" cy="13" r="2.5" fill="#1a0f08"/>
    <!-- tronco arqueado pra direita -->
    <path d="M 18 15 Q 21 19 19 22 L 15 22 Q 14 18 14 15 Z" fill="#1a0f08"/>
    <!-- braço esquerdo estendido -->
    <path d="M 14 16 L 9 18 L 10 19 L 14 17 Z" fill="#1a0f08"/>
    <!-- faixa -->
    <rect x="14" y="18" width="5" height="1.5" fill="#d4a04c"/>
    <!-- perna direita dobrada -->
    <path d="M 19 22 L 21 26 L 19 27 L 17 23 Z" fill="#1a0f08"/>
    <!-- perna esquerda esticada -->
    <path d="M 16 22 L 13 28 L 11 28 L 15 22 Z" fill="#1a0f08"/>
    <!-- sapatos -->
    <ellipse cx="20" cy="27" rx="2" ry="1" fill="#1a0f08"/>
    <ellipse cx="12" cy="28" rx="2" ry="1" fill="#1a0f08"/>
  </g>
</svg>
